<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
    
    <style>
        /*Zona de estilos*/

        /*sección de selectores tipo TAG*/

        div{
           
            display: block ;
        }
         
        label{
            display: block;
            
        }

        input{
            margin: 0 auto;
            width: 30%;

        }

        button{
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.1s ease;
        }

        .btn-primary{
            background-color: #3b6ac2;
        }

        .btn-primary:hover{
            background-color: #000ecc;
        }

        .btn-secondary{
            background-color: #6C757D;
        }

        .btn-secondary:hover{
            background-color: #474e53;
        }

        .contenedor_genral{
            background-color: #F5F7FA;

        }
        .titulo_texto{
            margin: 0 auto;
            padding: 10px;
            text-align: center;
        }

        .contenedor_hijo{
            position: relative;
            background-color: #FFFFFF;
            width: 80%;
            margin: 0 auto;
            margin-bottom: 3%;
            text-align: center;
            align-items: center;
            align-content: center;
            align-self: center;
            vertical-align: middle;
        }
        .contenedor_boton{
            display: block;
            background-color: #FFFFFF;
            width: 80%;
            margin: 0 auto;
            margin-bottom: 3%;
            text-align: center;

        }
        /*sección de selectrores de ID*/

        #contenedor_texto{
            color: aqua;
            font-size: 50px;
            text-shadow: 3px 4px 5px yellowgreen;
        }

        #imagen_perfil{
            position: relative;
            height: 200px;
            width: 40%;
            margin: 0 auto;
            border-radius: 50%;
            text-align: center;
            align-content: center;
            border: 4px solid rgba(255, 187, 0, 0.897);
            ;

        }
       
    </style>

</head>
<body>
    <div class="contenedor_genral">
        <!-- contenedor  padre-->
        <div class="contenedor_hijo">
        <!-- contenedor  hijo-->
         <div id="imagen_perfil"> Imagen</div>
         <h2 id="contenedor_texto" class="titulo_texto">Iniciar sesión</h2>

        </div>

        <div class="contenedor_hijo">
            <h2 class="titulo_texto">Datos de la sesión</h2>
            <label>Usuario: </label>
            <input type="text" />
            <br>
            <label>Clave:  </label>
            <input type="text" />
            <br>

            <div class="contenedor_boton">
                <br>
                <button class="btn-primary">Iniciar</button>
                <button class="btn-secondary">Regresar</button>
                <h4>0lvido contraseña..?</h4>
            </div>

        </div>

  

    </div>

    
<!-- contenedor hijo de los datos de sesion-->
</body>
</html>
